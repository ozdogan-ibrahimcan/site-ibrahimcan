<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
    <defs>
        <style>
            .background { fill: #1f2937; }
            .gear { fill: #2563eb; }
            .accent { fill: #60a5fa; }
            @media (prefers-color-scheme: dark) {
                .background { fill: #0f172a; }
            }
        </style>
    </defs>
    <rect class="background" width="128" height="128" rx="20"/>
    <!-- Main Gear -->
    <g transform="translate(64, 64)">
        <circle class="gear" cx="0" cy="0" r="28"/>
        <circle fill="#1f2937" cx="0" cy="0" r="18"/>
        <!-- Gear teeth -->
        <rect class="gear" x="-4" y="-32" width="8" height="6"/>
        <rect class="gear" x="-4" y="26" width="8" height="6"/>
        <rect class="gear" x="-32" y="-4" width="6" height="8"/>
        <rect class="gear" x="26" y="-4" width="6" height="8"/>
        <!-- Small accent circle -->
        <circle class="accent" cx="0" cy="0" r="6"/>
    </g>
</svg>
